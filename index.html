<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Viral Videos</title>

  <link rel="stylesheet" href="./style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<header>
  🎬 Daily Viral Videos
</header>

<div class="container">

  <input type="text" class="search" placeholder="🔍 Search Videos...">

  <div class="category">
    <button>🔥 Trending</button>
    <button>😂 Funny</button>
    <button>🎬 Movies</button>
    <button>❤️ Status</button>
    <button>🎵 Songs</button>
  </div>

  <div class="card">
    <img src="./file_0000000055387208992b1e0f18094e05.png" alt="Banner">

    <div class="content">
      <div class="title">🔥 Latest Viral Videos</div>

      <div class="desc">
        Watch the latest viral videos every day. Join our Telegram channel now.
      </div>

      <button onclick="openChannel()">
        📢 Join Telegram Channel
      </button>
    </div>
  </div>

  <div class="card">
    <img src="./file_0000000055387208992b1e0f18094e05.png" alt="Funny">

    <div class="content">
      <div class="title">😂 Funny Videos</div>

      <div class="desc">
        Best funny clips updated daily.
      </div>

      <button onclick="openChannel()">
        ▶ Watch Now
      </button>
    </div>
  </div>

  <div class="card">
    <img src="./file_0000000055387208992b1e0f18094e05.png" alt="Movies">

    <div class="content">
      <div class="title">🎬 Movie Clips</div>

      <div class="desc">
        Trending movie scenes and edits.
      </div>

      <button onclick="openChannel()">
        ▶ Watch Now
      </button>
    </div>
  </div>

</div>

<script src="./script.js"></script>

<script>
const tg = window.Telegram?.WebApp;

if (tg) {
  tg.ready();
  tg.expand();
}

function openChannel() {
  window.location.href = "https://t.me/VIRALVIDEOS_8";
}
</script>

</body>
</html>
