<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Viral Videos</title>

  <link rel="stylesheet" href="./style.css">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<header>
  🎬 Daily Viral Videos
</header>

<div class="container">
  <!-- Firebase se posts yaha automatically load hongi -->
</div>

<script type="module" src="./script.js"></script>

<script>
const tg = window.Telegram?.WebApp;

if (tg) {
  tg.ready();
  tg.expand();

  // Telegram theme
  document.body.style.background =
    tg.themeParams.bg_color || "#0f172a";

  // Main Button
  tg.MainButton.setText("📢 Join Telegram");
  tg.MainButton.show();

  tg.MainButton.onClick(() => {
    window.open("https://t.me/VIRALVIDEOS_8", "_blank");
  });
}
</script>

</body>
</html>
