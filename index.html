<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Viral Videos</title>

<link rel="stylesheet" href="./style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<header class="topbar">

<div class="left">

<div class="avatar"></div>

<div class="info">
<h2>Daily Viral Videos</h2>
<span id="postCount">Loading...</span>
</div>

</div>

<div class="right">

<button id="searchBtn">

<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<circle cx="11" cy="11" r="7"></circle>
<line x1="20" y1="20" x2="16.5" y2="16.5"></line>

</svg>

</button>

<button id="refreshBtn" onclick="location.reload()">

<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
<polyline points="21 3 21 9 15 9"></polyline>

</svg>

</button>

</div>

</header>

<div class="container">

<div class="tabs">

<button class="active">
📂 All Posts
</button>

<button>
🔖 Saved
</button>

</div>

<div id="posts"></div>

</div>

<script type="module" src="./script.js"></script>

<script>

const tg = window.Telegram?.WebApp;

if(tg){

tg.ready();
tg.expand();

document.body.style.background =
tg.themeParams.bg_color || "#0f172a";

try{

tg.MainButton.setText("📢 Join Telegram");
tg.MainButton.show();

tg.MainButton.onClick(()=>{

tg.openTelegramLink("https://t.me/VIRALVIDEOS_8");

});

}catch(e){}

}

</script>

</body>
</html>
