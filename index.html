<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Viral Videos</title>

<link rel="stylesheet" href="./style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<header class="topbar">

<div class="left">

<div class="avatar">
    <img src="logo.png" alt="Logo">
</div>

<div class="info">
<h2>Daily Viral Videos</h2>
<span id="postCount">Loading...</span>
</div>

</div>

<div class="right">

<button id="searchBtn">

<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24"
fill="none"
stroke="#ffffff"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"
width="22"
height="22">

<circle cx="11" cy="11" r="7"></circle>
<line x1="21" y1="21" x2="16.65" y2="16.65"></line>

</svg>

</button>

<button id="refreshBtn" onclick="location.reload()">

<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24"
fill="none"
stroke="#ffffff"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"
width="22"
height="22">

<polyline points="23 4 23 10 17 10"></polyline>
<polyline points="1 20 1 14 7 14"></polyline>
<path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10"></path>
<path d="M20.49 15A9 9 0 0 1 6.36 18.36L1 14"></path>

</svg>

</button>

</div>

</header>

<div class="container">

<div class="tabs">

<button class="active">
📂 All Posts
</button>

<button>
🔖 Saved
</button>

</div>

<div id="posts"></div>

</div>

<script type="module" src="./script.js?v=3"></script>

<script>

const tg = window.Telegram?.WebApp;

if(tg){

tg.ready();
tg.expand();

document.body.style.background =
tg.themeParams.bg_color || "#0f172a";

try{

tg.MainButton.setText("📢 Join Telegram");
tg.MainButton.show();

tg.MainButton.onClick(()=>{

tg.openTelegramLink("https://t.me/ZRL_LZR_HACK");
});

}catch(e){}

}

</script>

</body>
</html>
