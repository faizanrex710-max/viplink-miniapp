<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Viral Videos</title>

  <link rel="stylesheet" href="./style.css">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<header>
  Daily Viral Videos
</header>

<div class="container">

  <div class="card">
    <img src="./file_0000000055387208992b1e0f18094e05.png" alt="Daily Viral Videos Banner">

    <div class="content">
      <div class="title">
        🔥 Latest Viral Video

      <div class="desc">
        Join our Telegram channel to watch the latest viral videos every day.

      <button onclick="openChannel()">

<script src="./script.js"></script>

<script>

if (tg) {
  tg.ready();
  tg.expand();

function openChannel() {
  window.location.href = "https://t.me/VIRALVIDEOS_8";

</script>

</html>
