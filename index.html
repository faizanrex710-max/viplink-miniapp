<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Viral Videos</title>

<link rel="stylesheet" href="./style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<header class="topbar">

<div class="left">

<div class="avatar"></div>

<div class="info">
<h2>Daily Viral Videos</h2>
<span id="postCount">Loading...</span>
</div>

</div>

<div class="right">

<button id="searchBtn">🔍</button>

<button id="refreshBtn" onclick="location.reload()">
🔄
</button>

</div>

</header>

<div class="container">

<!-- Tabs -->

<div class="tabs">

<button class="active">
📂 All Posts
</button>

<button>
🔖 Saved
</button>

</div>

<!-- Posts -->

<div id="posts"></div>

</div>

<script type="module" src="./script.js"></script>

<script>

const tg = window.Telegram?.WebApp;

if(tg){

tg.ready();
tg.expand();

document.body.style.background =
tg.themeParams.bg_color || "#0f172a";

try{

tg.MainButton.setText("📢 Join Telegram");
tg.MainButton.show();

tg.MainButton.onClick(()=>{

tg.openTelegramLink("https://t.me/VIRALVIDEOS_8");

});

}catch(e){}

}

</script>

</body>
</html>
