<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Admin Panel</title>

<style>
body{
background:#0f172a;
font-family:Arial,sans-serif;
padding:20px;
color:#fff;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.post{
background:#334155;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.post img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.delete{
background:#dc2626;
margin-top:10px;
}

.delete:hover{
background:#b91c1c;
}

h2,h3{
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h2>🔥 VIP Admin Panel</h2>

<input id="title" placeholder="Video Title">

<input id="image" placeholder="Image URL">

<input id="link" placeholder="Terabox / Diskwala Link">

<button onclick="publishPost()">
🚀 Publish Post
</button>

<hr style="margin:20px 0;">

<h3>📋 All Posts</h3>

<div id="postsList">
Loading...
</div>

</div>

<script type="module" src="./admin.js"></script>

</body>
</html>
